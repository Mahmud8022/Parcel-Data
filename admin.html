<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
</head>
<body>
    <h2>🛠️ Admin Panel</h2>

    <div id="list"></div>
    <script>
      function loadParcels() {
        let html = "";

        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          const data = JSON.parse(localStorage.getItem(key));

          html += `
          <div style="border:1px solid #000; padding:10px;margin:10px;">
            <p><b>Name:</b>${data.name}</p>
            <p><b>Phone:</b>${data.phone}</p>
            <p><b>Address:</b>${data.address}</p>
            <p><b>Tracking:</b>${data.trackingId}</p>
            <p><b>Status:</b>${data.status}</p>

            <button onclick="updateStatus('${key}','Shipped')">🚚 Ship</button>
            <button onclick="updateStatus('${key}','Delivered')">✅ Delivered</button>
            <button onclick="deleteParcel('${key}')">❌ Delete</button>
          </div>
          `;
        }

        document.getElementById("list").innerHTML = html;
      }

      function updateStatus(key,status) {
        let parcel = JSON.parse(localStorage.getItem(key));
        parcel.status = status;
        localStorage.setItem(key, JSON.stringify(parcel));
        loadParcels();
      }S

      function deleteParcel(key) {
        localStorage.removeItem(key);
        loadParcels();
      }

      loadParcels();
    </script>
</body>
</html>
